<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator — ToolDeck</title>
  <meta name="description" content="Generate secure, strong, random passwords instantly. Client-side, privacy-focused.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .pass-display {
      width: 100%;
      min-height: 80px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: monospace;
      font-size: 24px;
      padding: 20px;
      text-align: center;
      word-break: break-all;
      color: var(--t1);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .check-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .check-item input { width: 18px; height: 18px; cursor: pointer; }
    .len-slider { width: 100%; margin-bottom: 20px; accent-color: var(--primary); }
    .len-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: 500; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- Only one center panel -->
      <div class="tool-panel" style="grid-column: span 12; max-width: 600px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">Password Generator</h1>
          <p class="ws-sub">Generate secure, random passwords entirely in your browser.</p>
        </div>
        
        <div class="ws-content">
          <div class="pass-display" id="pass-display">...</div>
          
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <button class="cta-btn" id="btn-copy">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Copy Password
            </button>
            <button class="sec-btn" id="btn-gen">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              Regenerate
            </button>
          </div>

          <div class="len-header">
            <span>Password Length</span>
            <span id="len-val">16</span>
          </div>
          <input type="range" id="pass-len" class="len-slider" min="4" max="64" value="16">

          <div class="check-list">
            <label class="check-item"><input type="checkbox" id="chk-upper" checked> <span>Uppercase (A-Z)</span></label>
            <label class="check-item"><input type="checkbox" id="chk-lower" checked> <span>Lowercase (a-z)</span></label>
            <label class="check-item"><input type="checkbox" id="chk-num" checked> <span>Numbers (0-9)</span></label>
            <label class="check-item"><input type="checkbox" id="chk-sym" checked> <span>Symbols (!@#$%^&*)</span></label>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="password-gen.js"></script>
</body>
</html>
