<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Minifier — ToolDeck</title>
  <meta name="description" content="Minify your HTML, CSS, and JS code instantly to reduce file size.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <script src="https://cdn.jsdelivr.net/npm/terser/dist/bundle.min.js"></script>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- One panel center -->
      <div class="tool-panel" style="grid-column: span 12; max-width: 800px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">Code Minifier</h1>
          <p class="ws-sub">Compress your HTML, CSS, and JS to reduce file sizes.</p>
        </div>
        
        <div class="ws-content">
          <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:15px;justify-content:center;">
            <button class="cta-btn" id="btn-min-html">Minify HTML</button>
            <button class="cta-btn" id="btn-min-css" >Minify CSS</button>
            <button class="cta-btn" id="btn-min-js" >Minify JS</button>
          </div>
          
          <div id="min-error" style="color:#ef4444;font-size:14px;margin-bottom:10px;text-align:center;display:none;"></div>
          <div id="min-success" style="color:#22c55e;font-size:14px;margin-bottom:10px;text-align:center;display:none;"></div>

          <textarea id="code-input" class="text-area" placeholder="Paste your code here..." style="height:350px; font-family:monospace; white-space:pre;"></textarea>
          
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:15px;">
            <button class="sec-btn" id="btn-clear">Clear</button>
            <button class="sec-btn" id="btn-copy">Copy Result</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="code-minify.js"></script>
</body>
</html>
