<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compress PNG - Reduce File Size | ToolDeck</title>
  <meta name="description" content="Compress PNG images without losing transparency. Batch compress multiple PNGs locally in your browser.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .img-list { list-style: none; padding: 0; margin: 0; }
    .img-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
    .img-info { display: flex; align-items: center; gap: 15px; }
    .img-thumb { width: 40px; height: 40px; object-fit: contain; background: rgba(0,0,0,0.1); border-radius: 4px; }
    .img-name { font-weight: 500; font-size: 0.95rem; }
    .img-size { font-size: 0.8rem; color: var(--text-muted); }
    .img-status { font-size: 0.85rem; font-weight: 600; }
    .status-done { color: #10b981; }
    .status-pending { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Compress PNG</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main">
      <div id="upload-zone" class="upload-zone">
        <svg class="upl-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2 class="upl-title">Select PNG Images</h2>
        <p class="upl-sub">Or drag and drop them here</p>
        <button class="upl-btn" id="btn-select">Select Images</button>
        <input type="file" id="file-input" accept="image/png" multiple style="display:none">
        <p class="upl-note">Batch processing supported. Compression happens securely in your browser.</p>
      </div>

      <div id="workspace" class="workspace" style="display:none; max-width: 800px; margin: 40px auto; width: 100%;">
        <div class="ws-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;" id="file-count">0 images selected</h3>
            <button class="sec-btn" id="btn-add-more">Add More</button>
          </div>

          <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
            <ul class="img-list" id="img-list">
              <!-- Items injected here -->
            </ul>
          </div>

          <div style="background: var(--bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px;">
            <h3 style="margin-top: 0; font-size: 1rem; margin-bottom: 15px;">Compression Settings</h3>
            
            <label class="opt-label">Compression Level (Max Size limit roughly)</label>
            <select id="level-select" class="opt-select" style="margin-bottom: 15px;">
              <option value="1">Light (Best Quality) ~ 1MB max</option>
              <option value="2" selected>Medium (Recommended) ~ 500KB max</option>
              <option value="3">Extreme (Smallest File) ~ 100KB max</option>
            </select>
            
            <label class="opt-checkbox" style="margin-top: 10px;">
              <input type="checkbox" id="resize-chk">
              <span>Also resize large images (max 1920px width/height)</span>
            </label>
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="sec-btn" id="btn-cancel" style="flex: 1;">Cancel</button>
            <button class="cta-btn" id="btn-start" style="flex: 2; justify-content: center;">Compress Images</button>
          </div>
        </div>
      </div>

      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <h3 id="progress-text">Compressing Images...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="result-zone" class="result-zone" style="display:none">
        <div class="res-card">
          <div class="res-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <h3 class="res-title">Compression Complete!</h3>
          <p class="res-sub" id="res-stats">Saved 0% (0 KB to 0 KB)</p>
          
          <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="#" id="btn-download" class="cta-btn" download>Download ZIP</a>
          </div>
          <button class="sec-btn" onclick="location.reload()" style="margin-top:15px; border:none; background:transparent;">Compress More</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="compress-png.js"></script>
</body>
</html>
