<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare PDF - Find Differences | ToolDeck</title>
  <meta name="description" content="Compare two PDF documents side-by-side and highlight text differences. Free and private in your browser.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .compare-grid { display: flex; gap: 20px; margin-bottom: 20px; }
    .upload-box { flex: 1; border: 2px dashed var(--border); padding: 30px 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
    .upload-box:hover { border-color: var(--primary); background: var(--bg-hover); }
    .upload-box.has-file { border-style: solid; border-color: var(--border); background: var(--bg-card); cursor: default; }
    .upload-box h3 { margin-top: 0; font-size: 1.1rem; color: var(--text); }
    
    .diff-container { display: flex; gap: 20px; width: 100%; height: 60vh; }
    .diff-pane { flex: 1; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-hover); overflow-y: auto; padding: 20px; font-family: monospace; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; color: var(--text); }
    
    .diff-add { background-color: rgba(16, 185, 129, 0.2); color: #10b981; }
    .diff-del { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; text-decoration: line-through; }
    .diff-neutral { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Compare PDF</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main" style="max-width: 1200px;">
      
      <div id="upload-zone" style="margin-top: 20px;">
        <h2 class="upl-title" style="text-align: center; margin-bottom: 20px;">Select Two PDFs to Compare</h2>
        
        <div class="compare-grid">
          <div class="upload-box" id="box-1">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
            <h3>Original PDF (File 1)</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Click or drop file</p>
            <input type="file" id="file-1" accept="application/pdf" style="display:none">
            <div id="info-1" style="display:none; margin-top: 15px; font-weight: 500; color: var(--primary);"></div>
          </div>
          
          <div class="upload-box" id="box-2">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:10px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
            <h3>Modified PDF (File 2)</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted);">Click or drop file</p>
            <input type="file" id="file-2" accept="application/pdf" style="display:none">
            <div id="info-2" style="display:none; margin-top: 15px; font-weight: 500; color: var(--primary);"></div>
          </div>
        </div>

        <div style="text-align: center;">
          <button class="cta-btn" id="btn-compare" style="padding: 12px 30px; font-size: 1.1rem;" disabled>Compare Texts</button>
        </div>
      </div>

      <div id="progress-wrap" class="progress-wrap" style="display:none; max-width: 600px; margin: 40px auto;">
        <h3 id="progress-text">Extracting Text & Comparing...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="result-zone" class="result-zone" style="display:none; max-width: 100%; box-shadow: none; background: transparent; padding: 0;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h3 style="margin: 0;">Comparison Result</h3>
          <div style="display: flex; gap: 10px;">
            <span style="font-size: 0.85rem; padding: 4px 8px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border-radius: 4px;">Removed in File 2</span>
            <span style="font-size: 0.85rem; padding: 4px 8px; background: rgba(16, 185, 129, 0.2); color: #10b981; border-radius: 4px;">Added in File 2</span>
            <button class="sec-btn" onclick="location.reload()" style="padding: 4px 12px; font-size: 0.85rem;">Start Over</button>
          </div>
        </div>

        <div class="diff-container">
          <div class="diff-pane" id="pane-1"></div>
          <div class="diff-pane" id="pane-2"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';</script>
  <!-- jsdiff for text diffing -->
  <script src="https://unpkg.com/diff@5.2.0/dist/diff.js"></script>
  <script src="compare-pdf.js"></script>
</body>
</html>
