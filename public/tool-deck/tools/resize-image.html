<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resize Image - Change Dimensions | ToolDeck</title>
  <meta name="description" content="Resize images by exact pixels or percentage. Batch resize multiple photos locally.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .img-list { list-style: none; padding: 0; margin: 0; }
    .img-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
    .img-info { display: flex; align-items: center; gap: 15px; }
    .img-thumb { width: 40px; height: 40px; object-fit: cover; background: rgba(0,0,0,0.1); border-radius: 4px; }
    .img-name { font-weight: 500; font-size: 0.95rem; }
    .img-size { font-size: 0.8rem; color: var(--text-muted); }
    
    .opt-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
    .opt-group { flex: 1; }
    .opt-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Resize Image</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main">
      <div id="upload-zone" class="upload-zone">
        <svg class="upl-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="1.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <h2 class="upl-title">Select Images</h2>
        <p class="upl-sub">Or drag and drop them here</p>
        <button class="upl-btn" id="btn-select">Select Images</button>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none">
        <p class="upl-note">Batch processing supported. Resize happens entirely in your browser.</p>
      </div>

      <div id="workspace" class="workspace" style="display:none; max-width: 800px; margin: 40px auto; width: 100%;">
        <div class="ws-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;" id="file-count">0 images selected</h3>
            <button class="sec-btn" id="btn-add-more">Add More</button>
          </div>

          <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
            <ul class="img-list" id="img-list">
              <!-- Items injected here -->
            </ul>
          </div>

          <div style="background: var(--bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px;">
            <h3 style="margin-top: 0; font-size: 1rem; margin-bottom: 15px;">Resize Settings</h3>
            
            <div style="display: flex; gap: 20px; margin-bottom: 15px;">
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="resize-type" value="percentage" checked> By Percentage
              </label>
              <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="radio" name="resize-type" value="pixels"> By Exact Pixels
              </label>
            </div>
            
            <div id="settings-percentage">
              <label class="opt-label">Scale Factor</label>
              <div style="display: flex; align-items: center; gap: 15px;">
                <input type="range" id="perc-slider" min="10" max="200" value="50" style="flex: 1;">
                <span id="perc-val" style="font-weight: 500; min-width: 50px;">50%</span>
              </div>
            </div>
            
            <div id="settings-pixels" style="display:none;">
              <div class="opt-row">
                <div class="opt-group">
                  <label class="opt-label">Width (px)</label>
                  <input type="number" id="px-width" class="opt-input" placeholder="e.g. 1920">
                </div>
                <div class="opt-group" style="flex: 0 0 30px; text-align: center; margin-top: 25px;">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="12" x2="16" y2="12"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
                </div>
                <div class="opt-group">
                  <label class="opt-label">Height (px)</label>
                  <input type="number" id="px-height" class="opt-input" placeholder="e.g. 1080">
                </div>
              </div>
              <label class="opt-checkbox" style="margin-top:0;">
                <input type="checkbox" id="px-aspect" checked>
                <span>Maintain aspect ratio</span>
              </label>
            </div>
            
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="sec-btn" id="btn-cancel" style="flex: 1;">Cancel</button>
            <button class="cta-btn" id="btn-start" style="flex: 2; justify-content: center;">Resize Images</button>
          </div>
        </div>
      </div>

      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <h3 id="progress-text">Resizing Images...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="result-zone" class="result-zone" style="display:none">
        <div class="res-card">
          <div class="res-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0891b2" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <h3 class="res-title">Resizing Complete!</h3>
          <p class="res-sub">All images have been resized.</p>
          
          <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="#" id="btn-download" class="cta-btn" download>Download ZIP</a>
          </div>
          <button class="sec-btn" onclick="location.reload()" style="margin-top:15px; border:none; background:transparent;">Resize More</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="resize-image.js"></script>
</body>
</html>
