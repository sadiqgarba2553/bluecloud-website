<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebP to PNG - Convert Images | ToolDeck</title>
  <meta name="description" content="Convert WebP images to PNG format for maximum compatibility. Batch convert locally in your browser.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .img-list { list-style: none; padding: 0; margin: 0; }
    .img-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
    .img-info { display: flex; align-items: center; gap: 15px; }
    .img-thumb { width: 40px; height: 40px; object-fit: contain; background: rgba(0,0,0,0.1); border-radius: 4px; }
    .img-name { font-weight: 500; font-size: 0.95rem; }
    .img-size { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">WebP to PNG</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main">
      <div id="upload-zone" class="upload-zone">
        <svg class="upl-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
        <h2 class="upl-title">Select WebP Images</h2>
        <p class="upl-sub">Or drag and drop them here</p>
        <button class="upl-btn" id="btn-select">Select Images</button>
        <input type="file" id="file-input" accept="image/webp" multiple style="display:none">
        <p class="upl-note">Batch processing supported. Conversion happens entirely in your browser.</p>
      </div>

      <div id="workspace" class="workspace" style="display:none; max-width: 800px; margin: 40px auto; width: 100%;">
        <div class="ws-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;" id="file-count">0 images selected</h3>
            <button class="sec-btn" id="btn-add-more">Add More</button>
          </div>

          <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
            <ul class="img-list" id="img-list">
              <!-- Items injected here -->
            </ul>
          </div>

          <div style="display: flex; gap: 10px;">
            <button class="sec-btn" id="btn-cancel" style="flex: 1;">Cancel</button>
            <button class="cta-btn" id="btn-start" style="flex: 2; justify-content: center;">Convert to PNG</button>
          </div>
        </div>
      </div>

      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <h3 id="progress-text">Converting Images...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="result-zone" class="result-zone" style="display:none">
        <div class="res-card">
          <div class="res-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <h3 class="res-title">Conversion Complete!</h3>
          <p class="res-sub">All images have been converted to PNG format.</p>
          
          <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="#" id="btn-download" class="cta-btn" download>Download ZIP</a>
          </div>
          <button class="sec-btn" onclick="location.reload()" style="margin-top:15px; border:none; background:transparent;">Convert More</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="webp-to-png.js"></script>
</body>
</html>
