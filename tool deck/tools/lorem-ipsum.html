<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator | ToolDeck</title>
  <meta name="description" content="Generate dummy text instantly. Perfect for designers, developers, and mockups.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .workspace { max-width: 900px; margin: 40px auto; width: 100%; padding: 0 20px; }
    .ws-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 24px; }
    
    .toolbar { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; background: var(--bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
    .tool-group { display: flex; align-items: center; gap: 10px; }
    .tool-input { width: 80px; padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); }
    .tool-select { padding: 8px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); }
    
    .output-area { position: relative; }
    .output-text { width: 100%; min-height: 400px; padding: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 1rem; line-height: 1.6; resize: vertical; }
    
    .copy-btn { position: absolute; top: 15px; right: 15px; background: var(--accent); color: #fff; border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.15s; display: flex; align-items: center; gap: 6px; }
    .copy-btn:hover { background: var(--accent-h); }
    .copy-btn.success { }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Lorem Ipsum Generator</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main" style="padding-top: 80px;">
      <div class="workspace">
        <div class="ws-panel">
          <div style="margin-bottom: 24px;">
            <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Generate Dummy Text</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Instantly generate paragraphs, sentences, or words for your mockups.</p>
          </div>

          <div class="toolbar">
            <div class="tool-group">
              <label>Generate</label>
              <input type="number" id="count-input" class="tool-input" value="3" min="1" max="100">
            </div>
            <div class="tool-group">
              <select id="type-select" class="tool-select">
                <option value="paragraphs">Paragraphs</option>
                <option value="sentences">Sentences</option>
                <option value="words">Words</option>
              </select>
            </div>
            <div class="tool-group">
              <label style="display:flex; align-items:center; gap:5px; cursor:pointer;">
                <input type="checkbox" id="start-chk" checked>
                Start with "Lorem ipsum..."
              </label>
            </div>
            <div style="flex: 1; display: flex; justify-content: flex-end;">
              <button class="cta-btn" id="btn-generate" style="padding: 8px 16px;">Generate New</button>
            </div>
          </div>

          <div class="output-area">
            <textarea id="output-text" class="output-text" readonly></textarea>
            <button class="copy-btn" id="btn-copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy Text
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="lorem-ipsum.js"></script>
</body>
</html>
