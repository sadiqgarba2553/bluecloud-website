<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Generator — ToolDeck</title>
  <meta name="description" content="Generate MD5, SHA-1, SHA-256, SHA-512 hashes instantly from any text.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <style>
    .hash-out { margin-bottom: 15px; }
    .hash-out label { font-weight: 600; font-size: 13px; color: var(--t2); margin-bottom: 5px; display: block; }
    .hash-box { position: relative; }
    .hash-val { width: 100%; min-height: 44px; padding: 10px 45px 10px 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--t1); font-family: monospace; word-break: break-all; overflow: hidden; }
    .copy-icon { position: absolute; top: 50%; transform: translateY(-50%); right: 10px; cursor: pointer; color: var(--t3); padding: 5px; border-radius: 4px; }
    .copy-icon:hover { background: var(--bg3); color: var(--t1); }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- Left: input -->
      <div class="tool-panel">
        <div class="ws-header">
          <h1 class="ws-title">Hash Generator</h1>
          <p class="ws-sub">Generate multiple cryptographic hashes from any text in real-time.</p>
        </div>
        <div class="ws-content">
          <textarea id="hash-input" class="text-area" placeholder="Enter text to hash..." style="min-height:300px;"></textarea>
        </div>
      </div>
      <!-- Right: output -->
      <div class="ws-panel">
        <div class="ws-content">
          <div class="hash-out">
            <label>MD5</label>
            <div class="hash-box">
              <div id="out-md5" class="hash-val" contenteditable="false"></div>
              <svg class="copy-icon" onclick="copyHash('out-md5')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
          </div>
          <div class="hash-out">
            <label>SHA-1</label>
            <div class="hash-box">
              <div id="out-sha1" class="hash-val" contenteditable="false"></div>
              <svg class="copy-icon" onclick="copyHash('out-sha1')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
          </div>
          <div class="hash-out">
            <label>SHA-256</label>
            <div class="hash-box">
              <div id="out-sha256" class="hash-val" contenteditable="false"></div>
              <svg class="copy-icon" onclick="copyHash('out-sha256')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
          </div>
          <div class="hash-out">
            <label>SHA-512</label>
            <div class="hash-box">
              <div id="out-sha512" class="hash-val" contenteditable="false"></div>
              <svg class="copy-icon" onclick="copyHash('out-sha512')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="hash-generator.js"></script>
</body>
</html>
