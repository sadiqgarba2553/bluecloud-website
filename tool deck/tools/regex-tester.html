<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester — ToolDeck</title>
  <meta name="description" content="Test regular expressions dynamically against string payloads.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .rgx-input { width: 100%; height: 48px; padding: 0 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--t1); font-family: monospace; font-size: 18px; margin-bottom: 20px; }
    .rgx-flags { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 8px; color: var(--t2); font-family: monospace; }
    .rgx-wrap { position: relative; }
    .match-highlight { background: rgba(59, 130, 246, 0.3); border-radius: 2px; }
    .test-box { width: 100%; min-height: 250px; padding: 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--t1); font-family: monospace; font-size: 16px; white-space: pre-wrap; word-break: break-all; }
    .test-textarea { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; resize: none; font-family: monospace; font-size: 16px; padding: 15px; }
    .test-container { position: relative; width: 100%; min-height: 250px; }
    .rgx-error { color: #ef4444; font-size: 14px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- One panel center -->
      <div class="tool-panel" style="grid-column: span 12; max-width: 800px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">Regex Tester</h1>
          <p class="ws-sub">Test regular expressions against target strings.</p>
        </div>
        
        <div class="ws-content">
          <label style="font-weight:600;margin-bottom:8px;display:block;">Regular Expression</label>
          <div class="rgx-wrap">
            <input type="text" id="rgx-pattern" class="rgx-input" placeholder="[a-z]+" value="[a-z]+">
            <div class="rgx-flags">
              <span style="font-size:18px;">/</span>
              <input type="text" id="rgx-flags" style="width:40px;background:transparent;border:none;color:var(--t1);font-family:monospace;font-size:18px;outline:none;" value="g">
            </div>
          </div>
          <div id="rgx-error" class="rgx-error">Invalid regular expression</div>

          <label style="font-weight:600;margin-bottom:8px;display:block;margin-top:20px;">Test String</label>
          <div class="test-container">
            <div id="test-highlight" class="test-box">Hello world! This is 123 regex.</div>
            <textarea id="test-input" class="test-textarea" spellcheck="false">Hello world! This is 123 regex.</textarea>
          </div>
          
          <div style="margin-top:20px; padding:15px; background:var(--bg3); border-radius:8px;">
            <strong style="color:var(--t1);">Match Result:</strong>
            <span id="match-count" style="color:var(--primary); font-weight:600; margin-left:10px;">0 matches</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="regex-tester.js"></script>
</body>
</html>
