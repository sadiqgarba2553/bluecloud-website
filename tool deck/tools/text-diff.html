<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Diff Viewer - Compare Text | ToolDeck</title>
  <meta name="description" content="Compare two blocks of text and see the differences instantly.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .workspace { max-width: 1200px; margin: 40px auto; width: 100%; padding: 0 20px; }
    .ws-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-xl); padding: 24px; }
    
    .diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .diff-grid { grid-template-columns: 1fr; } }
    
    .text-box-wrap { display: flex; flex-direction: column; gap: 8px; }
    .text-box-wrap label { font-size: 0.9rem; font-weight: 600; color: var(--t1); }
    .text-box { width: 100%; height: 250px; padding: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: monospace; font-size: 0.9rem; line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.2s; }
    .text-box:focus { border-color: var(--accent); }
    
    .toolbar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    
    .diff-result-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; display: none; overflow: hidden; }
    .diff-result-wrap.visible { display: block; }
    .diff-header { padding: 12px 20px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; gap: 20px; font-size: 0.85rem; font-weight: 600; }
    .diff-header .added { color: #10b981; }
    .diff-header .removed { color: #ef4444; }
    
    .diff-content { padding: 20px; font-family: monospace; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: var(--text); overflow-y: auto; max-height: 500px; }
    
    .diff-content del { background: rgba(239, 68, 68, 0.2); color: #ef4444; text-decoration: none; padding: 2px 0; border-radius: 2px; }
    .diff-content ins { background: rgba(16, 185, 129, 0.2); color: #10b981; text-decoration: none; padding: 2px 0; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Diff Viewer</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main" style="padding-top: 80px;">
      <div class="workspace">
        <div class="ws-panel">
          
          <div style="margin-bottom: 24px; text-align: center;">
            <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Compare Text</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Paste two blocks of text below to highlight the differences.</p>
          </div>

          <div class="diff-grid">
            <div class="text-box-wrap">
              <label>Original Text</label>
              <textarea id="text-old" class="text-box" placeholder="Paste original text here..."></textarea>
            </div>
            <div class="text-box-wrap">
              <label>Modified Text</label>
              <textarea id="text-new" class="text-box" placeholder="Paste modified text here..."></textarea>
            </div>
          </div>
          
          <div class="toolbar">
            <label style="display:flex; align-items:center; gap:5px; cursor:pointer; margin-right: 20px; font-size: 0.9rem;">
              <input type="checkbox" id="diff-words" checked>
              Compare by Words
            </label>
            <button class="sec-btn" id="btn-clear">Clear Both</button>
            <button class="cta-btn" id="btn-compare">Compare Text</button>
          </div>
          
          <div class="diff-result-wrap" id="diff-result-wrap">
            <div class="diff-header">
              <span>Result:</span>
              <span class="added">+ Added</span>
              <span class="removed">- Removed</span>
            </div>
            <div class="diff-content" id="diff-content"></div>
          </div>
          
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
  <script src="text-diff.js"></script>
</body>
</html>
