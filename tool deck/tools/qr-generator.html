<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator — ToolDeck</title>
  <meta name="description" content="Generate customizable QR codes for URLs, text, email, and more instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- Left side: settings -->
      <div class="tool-panel">
        <div class="ws-header">
          <h1 class="ws-title">QR Code Generator</h1>
          <p class="ws-sub">Generate QR codes instantly from any text or link.</p>
        </div>
        
        <div class="ws-content">
          <label style="display:block;margin-bottom:8px;font-weight:500;">Content</label>
          <textarea id="qr-text" class="text-area" placeholder="Enter URL or text here..." style="min-height:100px;margin-bottom:20px;"></textarea>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
            <div>
              <label style="display:block;margin-bottom:8px;font-weight:500;">Size</label>
              <select id="qr-size" class="text-area" style="min-height:48px;cursor:pointer;">
                <option value="128">128x128</option>
                <option value="256" selected>256x256</option>
                <option value="512">512x512</option>
                <option value="1024">1024x1024</option>
              </select>
            </div>
            <div>
              <label style="display:block;margin-bottom:8px;font-weight:500;">Color</label>
              <div style="display:flex;gap:10px;align-items:center;">
                <input type="color" id="qr-color-dark" value="#000000" style="height:48px;border-radius:8px;border:1px solid var(--border);cursor:pointer;flex:1;">
                <input type="color" id="qr-color-light" value="#ffffff" style="height:48px;border-radius:8px;border:1px solid var(--border);cursor:pointer;flex:1;">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right side: result -->
      <div class="ws-panel" id="result-panel">
        <div class="res-card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;background:var(--bg2);">
          <div id="qrcode" style="padding:16px;border-radius:8px;margin-bottom:20px;display:none;"></div>
          <p id="qr-placeholder" style="color:var(--t3);text-align:center;">Enter text to generate QR code</p>
          <button class="cta-btn" id="btn-download" style="display:none;width:100%;">Download PNG</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="qr-generator.js"></script>
</body>
</html>
