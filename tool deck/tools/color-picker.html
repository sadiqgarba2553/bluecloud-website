<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker — ToolDeck</title>
  <meta name="description" content="Pick colors and convert between HEX, RGB, and HSL formats instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .cp-preview {
      width: 100%;
      height: 150px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .cp-input {
      position: absolute;
      top: -10px; left: -10px; width: calc(100% + 20px); height: calc(100% + 20px);
      cursor: pointer;
      opacity: 0;
    }
    .cp-display {
      width: 100%; height: 100%; pointer-events: none;
      }
    .val-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .val-label { width: 40px; font-weight: 600; color: var(--t2); font-size: 14px; }
    .val-input { flex: 1; height: 44px; padding: 0 15px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--t1); font-family: monospace; font-size: 16px; }
    .val-copy { padding: 10px; cursor: pointer; color: var(--t3); border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); }
    .val-copy:hover { color: var(--t1); background: var(--bg3); }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- Only one center panel -->
      <div class="tool-panel" style="grid-column: span 12; max-width: 500px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">Color Picker</h1>
          <p class="ws-sub">Pick colors and convert between formats.</p>
        </div>
        
        <div class="ws-content">
          <div class="cp-preview">
            <div class="cp-display" id="cp-display"></div>
            <input type="color" id="cp-input" class="cp-input" value="#3b82f6">
          </div>
          
          <div class="val-row">
            <div class="val-label">HEX</div>
            <input type="text" id="val-hex" class="val-input" value="#3b82f6">
            <button class="val-copy" onclick="copyColor('val-hex')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
          </div>
          <div class="val-row">
            <div class="val-label">RGB</div>
            <input type="text" id="val-rgb" class="val-input" value="rgb(59, 130, 246)">
            <button class="val-copy" onclick="copyColor('val-rgb')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
          </div>
          <div class="val-row">
            <div class="val-label">HSL</div>
            <input type="text" id="val-hsl" class="val-input" value="hsl(217, 91%, 60%)">
            <button class="val-copy" onclick="copyColor('val-hsl')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="color-picker.js"></script>
</body>
</html>
