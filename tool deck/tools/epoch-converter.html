<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epoch Converter — ToolDeck</title>
  <meta name="description" content="Convert Unix epoch timestamps to human-readable dates and vice versa.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .epoch-box { background: var(--bg3); padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .epoch-now { font-family: monospace; font-size: 32px; color: var(--primary); font-weight: 700; margin: 10px 0; }
    .epoch-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 15px; }
    .date-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <div class="tool-panel" style="grid-column: span 12; max-width: 700px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">Epoch Converter</h1>
          <p class="ws-sub">Convert Unix timestamps to human-readable dates, or vice versa.</p>
        </div>
        
        <div class="ws-content">
          <div class="epoch-box">
            <div style="color:var(--t2);font-weight:600;">Current Unix Epoch Time</div>
            <div class="epoch-now" id="epoch-now">0</div>
          </div>

          <label style="font-weight:600;margin-bottom:8px;display:block;">Timestamp to Date</label>
          <div class="epoch-row">
            <input type="number" id="ts-input" class="text-area" placeholder="e.g. 1672531200" style="min-height:48px;">
            <button class="cta-btn" id="btn-ts2date">Convert</button>
          </div>
          <div id="ts-result" style="margin-bottom:30px;font-family:monospace;font-size:16px;color:var(--t1);background:var(--bg2);padding:15px;border-radius:8px;border:1px solid var(--border);min-height:50px;"></div>

          <label style="font-weight:600;margin-bottom:8px;display:block;">Date to Timestamp</label>
          <div class="date-grid">
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Year</label>
              <input type="number" id="d-yr" class="text-area" style="min-height:40px;">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Month</label>
              <input type="number" id="d-mo" class="text-area" style="min-height:40px;" min="1" max="12">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Day</label>
              <input type="number" id="d-dy" class="text-area" style="min-height:40px;" min="1" max="31">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Hour (24h)</label>
              <input type="number" id="d-hr" class="text-area" style="min-height:40px;" min="0" max="23">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Minute</label>
              <input type="number" id="d-mn" class="text-area" style="min-height:40px;" min="0" max="59">
            </div>
            <div>
              <label style="display:block;font-size:12px;color:var(--t3);margin-bottom:4px;">Second</label>
              <input type="number" id="d-sc" class="text-area" style="min-height:40px;" min="0" max="59">
            </div>
          </div>
          <button class="cta-btn" id="btn-date2ts" style="width:100%;margin-bottom:10px;">Convert</button>
          <div id="date-result" style="font-family:monospace;font-size:16px;color:var(--t1);background:var(--bg2);padding:15px;border-radius:8px;border:1px solid var(--border);min-height:50px;"></div>

        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="epoch-converter.js"></script>
</body>
</html>
