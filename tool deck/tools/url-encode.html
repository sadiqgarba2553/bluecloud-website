<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encode/Decode — ToolDeck</title>
  <meta name="description" content="Encode and decode URLs and parameters instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width:768px){ .split-view { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="../index.html" class="logo" id="logo-link">
        <div class="logo-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor"/><rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".55"/><rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity=".25"/></svg></div>
        <span>ToolDeck</span>
      </a>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg class="ic-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="ic-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="tool-main">
    <div class="tool-layout">
      <!-- One panel center -->
      <div class="tool-panel" style="grid-column: span 12; max-width: 900px; margin: 0 auto; width: 100%;">
        <div class="ws-header" style="text-align: center;">
          <h1 class="ws-title">URL Encode / Decode</h1>
          <p class="ws-sub">Safely encode URLs or decode them to their readable form.</p>
        </div>
        
        <div class="ws-content">
          <div class="split-view">
            <div>
              <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <label style="font-weight:600;">Input</label>
                <div>
                  <button class="sec-btn" id="btn-clear" style="padding:4px 8px;font-size:12px;">Clear</button>
                  <button class="sec-btn" id="btn-paste" style="padding:4px 8px;font-size:12px;">Paste</button>
                </div>
              </div>
              <textarea id="url-input" class="text-area" placeholder="Enter text or URL here..." style="height:300px;"></textarea>
            </div>
            <div>
              <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <label style="font-weight:600;">Output</label>
                <button class="sec-btn" id="btn-copy" style="padding:4px 8px;font-size:12px;">Copy</button>
              </div>
              <textarea id="url-output" class="text-area" style="height:300px;" readonly></textarea>
            </div>
          </div>
          
          <div style="display:flex;gap:15px;margin-top:20px;justify-content:center;">
            <button class="cta-btn" id="btn-encode">Encode</button>
            <button class="cta-btn" id="btn-decode" >Decode</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../app.js"></script>
  <script src="url-encode.js"></script>
</body>
</html>
