<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watermark Image - Add Text Overlays | ToolDeck</title>
  <meta name="description" content="Add text watermarks to your images. Batch process multiple photos easily without uploading.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../tool.css">
  <style>
    .img-list { list-style: none; padding: 0; margin: 0; }
    .img-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 10px; }
    .img-info { display: flex; align-items: center; gap: 15px; }
    .img-thumb { width: 40px; height: 40px; object-fit: cover; background: rgba(0,0,0,0.1); border-radius: 4px; }
    .img-name { font-weight: 500; font-size: 0.95rem; }
    .img-size { font-size: 0.8rem; color: var(--text-muted); }
    
    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
    .opt-col { display: flex; flex-direction: column; gap: 5px; }
    .opt-input { padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: inherit; }
  </style>
</head>
<body>
  <div class="tool-layout">
    <header class="tool-nav">
      <a href="../index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Tools
      </a>
      <div class="tool-title">Watermark Image</div>
      <div style="width:100px"></div>
    </header>

    <main class="tool-main">
      <div id="upload-zone" class="upload-zone">
        <svg class="upl-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <h2 class="upl-title">Select Images</h2>
        <p class="upl-sub">Or drag and drop photos here</p>
        <button class="upl-btn" id="btn-select">Select Images</button>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none">
        <p class="upl-note">Batch processing supported. Add your watermark locally.</p>
      </div>

      <div id="workspace" class="workspace" style="display:none; max-width: 800px; margin: 40px auto; width: 100%;">
        <div class="ws-panel">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3 style="margin: 0;" id="file-count">0 images selected</h3>
            <button class="sec-btn" id="btn-add-more">Add More</button>
          </div>

          <div style="max-height: 300px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
            <ul class="img-list" id="img-list">
              <!-- Items injected here -->
            </ul>
          </div>

          <div style="background: var(--bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px;">
            <h3 style="margin-top: 0; font-size: 1rem; margin-bottom: 15px;">Watermark Settings</h3>
            
            <div style="margin-bottom: 15px;">
              <label class="opt-label">Watermark Text</label>
              <input type="text" id="wm-text" class="opt-input" style="width:100%" placeholder="e.g.  Copyright 2025" value="ToolDeck Watermark">
            </div>

            <div class="opt-grid">
              <div class="opt-col">
                <label class="opt-label">Position</label>
                <select id="wm-pos" class="opt-input">
                  <option value="center">Center</option>
                  <option value="top-left">Top Left</option>
                  <option value="top-right">Top Right</option>
                  <option value="bottom-left">Bottom Left</option>
                  <option value="bottom-right" selected>Bottom Right</option>
                </select>
              </div>
              <div class="opt-col">
                <label class="opt-label">Color</label>
                <input type="color" id="wm-color" value="#ffffff" style="width:100%; height:40px; cursor:pointer; border:none; border-radius:4px;">
              </div>
            </div>

            <div class="opt-grid">
              <div class="opt-col">
                <label class="opt-label">Opacity (<span id="wm-op-val">50%</span>)</label>
                <input type="range" id="wm-opacity" min="10" max="100" value="50">
              </div>
              <div class="opt-col">
                <label class="opt-label">Size relative to image</label>
                <select id="wm-size" class="opt-input">
                  <option value="0.05">Small</option>
                  <option value="0.1" selected>Medium</option>
                  <option value="0.2">Large</option>
                  <option value="0.5">Huge</option>
                </select>
              </div>
            </div>

          </div>

          <div style="display: flex; gap: 10px;">
            <button class="sec-btn" id="btn-cancel" style="flex: 1;">Cancel</button>
            <button class="cta-btn" id="btn-start" style="flex: 2; justify-content: center;">Apply Watermarks</button>
          </div>
        </div>
      </div>

      <div id="progress-wrap" class="progress-wrap" style="display:none">
        <h3 id="progress-text">Applying Watermarks...</h3>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="result-zone" class="result-zone" style="display:none">
        <div class="res-card">
          <div class="res-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
          <h3 class="res-title">Processing Complete!</h3>
          <p class="res-sub">All images have been watermarked.</p>
          
          <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="#" id="btn-download" class="cta-btn" download>Download ZIP</a>
          </div>
          <button class="sec-btn" onclick="location.reload()" style="margin-top:15px; border:none; background:transparent;">Process More</button>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="watermark-image.js"></script>
</body>
</html>
